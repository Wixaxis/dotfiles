---
name: arch-update
description: Arch update helper configuration
state: active
engine: native
applies_when:
  os:
  - linux
install:
  arch:
    manager: paru
    packages:
    - arch-update
links:
- source: stow/.config
  target: ".config"
  mode: children
  create_parents: true
  backup_on_conflict: true
