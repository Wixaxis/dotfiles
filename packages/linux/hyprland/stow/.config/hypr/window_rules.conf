# ──────────────────────────────────────────────────────────────
#  General Rules
# ──────────────────────────────────────────────────────────────

windowrule = tile on, match:title ^(Neovide)$
windowrule = float on, match:title ^(Settings)$


# ──────────────────────────────────────────────────────────────
#  Flameshot
# ──────────────────────────────────────────────────────────────
# Multi-display fix - adjust size based on number of monitors
# For single monitor: size = monitor_w monitor_h
# For dual monitors: size = (monitor_w*2) monitor_h
# For triple monitors: size = (monitor_w*3) monitor_h
windowrule = float on, match:class ^(flameshot)$
windowrule = pin on, match:class ^(flameshot)$
windowrule = rounding 0, match:class ^(flameshot)$
windowrule = border_size 0, match:class ^(flameshot)$
windowrule = fullscreen_state 0 0, match:class ^(flameshot)$
windowrule = move 0 0, match:class ^(flameshot)$
windowrule = animation fade, match:class ^(flameshot)$

windowrule = float on, match:title ^(Extension: \(Bitwarden Password Manager\) - Bitwarden - Zen Browser)$
windowrule = float on, match:title ^(Extension:.*Bitwarden.*)$, match:class ^(zen-alpha)$

windowrule = stay_focused on, match:title ^()$, match:class ^(steam)$
windowrule = min_size 1 1, match:title ^()$, match:class ^(steam)$


# ──────────────────────────────────────────────────────────────
#  Picture-in-Picture
# ──────────────────────────────────────────────────────────────

windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = size 320 180, match:title ^(Picture-in-Picture)$
windowrule = move 100%-325 100%-185, match:title ^(Picture-in-Picture)$
windowrule = no_initial_focus on, match:title ^(Picture-in-Picture)$
windowrule = tag -hyprbars:nobar, match:title ^(Picture-in-Picture)$
