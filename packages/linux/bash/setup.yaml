---
name: bash
description: Bash configuration
state: active
engine: native
applies_when:
  os:
  - linux
install:
  arch:
    manager: paru
    packages:
    - bash
links:
- source: stow/.bashrc
  target: ".bashrc"
  mode: file
  create_parents: true
  backup_on_conflict: true
- source: stow/.config
  target: ".config"
  mode: children
  create_parents: true
  backup_on_conflict: true
