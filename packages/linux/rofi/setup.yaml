---
name: rofi
description: Rofi configuration
state: active
engine: native
applies_when:
  os:
  - linux
  desktop:
  - hyprland
install:
  arch:
    manager: paru
    packages:
    - rofi-wayland
links:
- source: stow/.config
  target: ".config"
  mode: children
  create_parents: true
  backup_on_conflict: true
- source: stow/.local
  target: ".local"
  mode: children
  create_parents: true
  backup_on_conflict: true
