source = ~/.config/hypr/base_bindings.conf


# ──────────────────────────────────────────────────────────────
#  Applications
# ──────────────────────────────────────────────────────────────

bind = $mainMod, RETURN, exec, vicinae app launch com.mitchellh.ghostty.desktop # Launch or focus Ghostty
bind = $mainMod, G, exec, vicinae app launch com.mitchellh.ghostty.desktop # Launch or focus Ghostty
bind = $mainMod SHIFT, RETURN, exec, vicinae app launch com.mitchellh.ghostty.desktop --new # Launch new Ghostty window
bind = $mainMod SHIFT, G, exec, vicinae app launch com.mitchellh.ghostty.desktop --new # Launch new Ghostty window
bind = $mainMod, W, exec, vicinae app launch google-chrome.desktop # Launch or focus Chrome
bind = $mainMod SHIFT, W, exec, vicinae app launch google-chrome.desktop --new # Launch new Chrome window
bind = $mainMod, T, exec, vicinae app launch org.telegram.desktop.desktop # Launch or focus Telegram
bind = $mainMod SHIFT, T, togglefloating # Toggle window floating mode
bind = $mainMod, A, exec, vicinae app launch opencode-desktop-electron.desktop # Launch or focus Opencode
bind = $mainMod SHIFT, A, exec, vicinae app launch opencode-desktop-electron.desktop --new # Launch new Opencode window
bind = $mainMod, O, exec, vicinae app launch thunar.desktop # Launch or focus Thunar
bind = $mainMod SHIFT, O, exec, vicinae app launch thunar.desktop --new # Launch new Thunar window
bind = $mainMod, B, exec, vicinae app launch md.obsidian.Obsidian.desktop # Launch or focus Obsidian
bind = $mainMod SHIFT, B, exec, vicinae app launch md.obsidian.Obsidian.desktop --new # Launch new Obsidian window
bind = $mainMod, Space, exec, vicinae toggle # Toggle Vicinae launcher
bind = $mainMod ALT, Space, exec, vicinae vicinae://extensions/vicinae/core/search-emojis # Open emoji picker
bind = $mainMod, TAB, exec, vicinae vicinae://extensions/vicinae/wm/switch-windows # Switch between windows
bind = $mainMod, slash, exec, vicinae vicinae://extensions/sovereign/hypr-keybinds/hyprland-keybinds # Show keybinds cheat sheet
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy # Open clipboard history
bind = $mainMod, J, exec, /home/wixaxis/scripts/quick-just.rb init # Open just task runner


# ──────────────────────────────────────────────────────────────
#  System
# ──────────────────────────────────────────────────────────────

bind = $mainMod, Q, killactive # Kill active window
bind = $mainMod, F, fullscreen, 1 # Toggle fullscreen (keep gaps)
bind = $mainMod SHIFT, F, fullscreen, 0 # Toggle fullscreen (no gaps)
bind = $mainMod, L, exec, hyprlock # Lock screen
bind = $mainMod, N, exec, swaync-client -t # Toggle notification center
bind = $mainMod SHIFT, R, exec, hyprctl reload # Reload Hyprland configuration
bind = $mainMod SHIFT, E, exec, /home/wixaxis/scripts/powermenu.rb init # Open power menu
bind = $mainMod SHIFT, M, exec, /home/wixaxis/scripts/reload_builtin_monitor.rb # Reload built-in monitor


# ──────────────────────────────────────────────────────────────
#  Media
# ──────────────────────────────────────────────────────────────

binde = , XF86MonBrightnessDown, exec, /home/wixaxis/scripts/brightness.rb - 10 # Decrease brightness
binde = , XF86MonBrightnessUp, exec, /home/wixaxis/scripts/brightness.rb + 10 # Increase brightness
bind = , XF86LaunchA, exec, /home/wixaxis/scripts/brightness.rb ! # Toggle auto brightness
binde = , XF86AudioPlay, exec, playerctl play-pause # Play/pause media
bind = , XF86AudioNext, exec, playerctl next # Next track
bind = , XF86AudioPrev, exec, playerctl prev # Previous track
binde = , XF86AudioRaiseVolume, exec, /home/wixaxis/scripts/volume-osd.sh up # Increase volume
binde = , XF86AudioLowerVolume, exec, /home/wixaxis/scripts/volume-osd.sh down # Decrease volume
bind = , XF86AudioMute, exec, /home/wixaxis/scripts/volume-osd.sh toggle # Toggle mute


# ──────────────────────────────────────────────────────────────
#  Screenshots
# ──────────────────────────────────────────────────────────────

bind = $mainMod, P, exec, flameshot gui # Take screenshot
